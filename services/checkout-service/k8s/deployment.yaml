apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-service
  namespace: walmart-prod
  labels:
    app: checkout-service
    team: payments
    env: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: checkout-service
  template:
    metadata:
      labels:
        app: checkout-service
        team: payments
        version: "1.4.2"
    spec:
      containers:
        - name: checkout-service
          image: walmart/checkout-service:1.4.2
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
      securityContext:
        runAsNonRoot: true
