apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  namespace: walmart-prod
  labels:
    app: payment-gateway
    team: payments
    env: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-gateway
  template:
    metadata:
      labels:
        app: payment-gateway
        team: payments
        version: "2.1.0"
    spec:
      containers:
        - name: payment-gateway
          image: walmart/payment-gateway:2.1.0
          ports:
            - containerPort: 3002
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3002"
