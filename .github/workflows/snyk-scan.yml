name: Snyk Security Scan

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to scan (e.g. checkout-service)'
        required: true
        type: string
      severity_threshold:
        description: 'Severity threshold (low/medium/high/critical)'
        required: false
        default: 'high'
        type: string
      port_run_id:
        description: 'Port run ID for reporting back'
        required: false
        type: string
      port_entity_identifier:
        description: 'Port entity identifier'
        required: false
        type: string

jobs:
  snyk-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          SERVICE_PATH="services/${{ github.event.inputs.service }}"
          if [ -d "$SERVICE_PATH" ]; then
            cd "$SERVICE_PATH"
            npm install
          else
            echo "Service directory not found: $SERVICE_PATH"
            exit 1
          fi

      - name: Run Snyk scan
        id: snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >
            --severity-threshold=${{ github.event.inputs.severity_threshold }}
            --json
            services/${{ github.event.inputs.service }}

      - name: Parse Snyk results
        id: parse
        run: |
          CRITICAL=$(echo '${{ steps.snyk.outputs.json }}' | jq '[.vulnerabilities[] | select(.severity=="critical")] | length' 2>/dev/null || echo "0")
          HIGH=$(echo '${{ steps.snyk.outputs.json }}' | jq '[.vulnerabilities[] | select(.severity=="high")] | length' 2>/dev/null || echo "0")
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "Scan complete: $CRITICAL critical, $HIGH high vulnerabilities"

      - name: Report results to Port
        if: ${{ github.event.inputs.port_run_id != '' }}
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.port_run_id }}
          logMessage: |
            Snyk scan completed for ${{ github.event.inputs.service }}
            Critical vulnerabilities: ${{ steps.parse.outputs.critical }}
            High vulnerabilities: ${{ steps.parse.outputs.high }}
            Threshold: ${{ github.event.inputs.severity_threshold }}

      - name: Summary
        run: |
          echo "## Snyk Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ github.event.inputs.service }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Severity Threshold | ${{ github.event.inputs.severity_threshold }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Critical CVEs | ${{ steps.parse.outputs.critical }} |" >> $GITHUB_STEP_SUMMARY
          echo "| High CVEs | ${{ steps.parse.outputs.high }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Port Run ID | ${{ github.event.inputs.port_run_id || 'N/A (manual trigger)' }} |" >> $GITHUB_STEP_SUMMARY
