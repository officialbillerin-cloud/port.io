name: CI ג€” Build & Test All Services

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - checkout-service
          - payment-gateway
          - inventory-api
          - search-service
          - auth-service
          - recommendation-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: npm test --if-present
        continue-on-error: true

      - name: Report build status to Port
        if: always()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: UPSERT
          identifier: ${{ matrix.service }}
          blueprint: service
          properties: |
            {
              "last_build_status": "${{ job.status }}",
              "last_build_sha": "${{ github.sha }}"
            }
